version: '3.7'
services:
    redis-distro:
        image: redis:7.2
        deploy:
            restart_policy:
                condition: on-failure
                # delay is time between restart attempts
                delay: 10s
                max_attempts: 4
                window: 120s
            replicas: 1
        hostname: redis-host-distro
        networks:
            bridge:
                aliases:
                    - redis-host-distro
        ports:
            - "${REDIS_PORT}:${REDIS_PORT}"
        
        # Saves to disk every 20 seconds (if 1 or more writes done)
        # command: redis-server --save 20 1 --loglevel warning --requirepass ${REDIS_PASSWORD}
        
        command: redis-server --port ${REDIS_PORT} --loglevel warning --requirepass ${REDIS_PASSWORD}
        environment:
            REDIS_HOST: "${REDIS_HOST}"
            REDIS_PORT: "${REDIS_PORT}"
            REDIS_PASSWORD: ${REDIS_PASSWORD}
            
        # todo-a: start using a cache folder
        # volumes: 
        #     - cache:/data

    mongo-distro: 
        hostname: mongo-host-distro
        image: mongo:6.0.8
        deploy:
            restart_policy:
                condition: on-failure
                # delay is time between restart attempts
                delay: 10s
                max_attempts: 4
                window: 120s
            replicas: 1
        networks:
            bridge:
                aliases:
                    - mongo-host-distro
                    
        # WARNING: volumes will not handle '~' character for home folder. Do not use.
        volumes:
            - '${MONGO_DATA}:/data/db'
            - '${MONGOD_CONF}:/etc/mongod.conf'
            - '${MONGO_BACKUP}:/backup'

        command: mongod --config /etc/mongod.conf

        environment:
            MONGO_INITDB_ROOT_USERNAME: root
            MONGO_INITDB_ROOT_PASSWORD: ${mongoPassword}

    pgdb-distro:
        image: postgres
        deploy:
            # Don't want a restart policy for DEV!
            # restart_policy:
            #     condition: on-failure
            #     # delay is time between restart attempts
            #     delay: 10s
            #     max_attempts: 4
            #     window: 120s
            replicas: 1
        hostname: pgdb-host-distro
        networks:
            bridge:
                aliases:
                    - pgdb-host-distro
        environment:
            - POSTGRES_USER=quanta-pg
            - POSTGRES_PASSWORD=${pgPassword}
        logging:
            options:
                max-size: 10m
                max-file: "3"
        # expose to host machine for management.
        ports:
            - '5432:5432'
        volumes: 
            - '${POSTGRES_DATA}:/var/lib/postgresql/data'

    # Disabled just to save server resources
    # Simply by uncommening this section you can enable pgadmin4
    # pgadmin4:
    #     image: dpage/pgadmin4:latest
    #     depends_on:
    #         - pgdb-distro
    #     environment:
    #         PGADMIN_DEFAULT_EMAIL: ${pgAdminEmail}
    #         PGADMIN_DEFAULT_PASSWORD: ${pgAdminPassword}
    #     ports:
    #         - '${PGADMIN_PORT}:80'
    #     networks:
    #         - bridge
    #     volumes:
    #         - '${PGADMIN_DATA}:/var/lib/pgadmin'

    # ipfs currently disabled pending further testing
    # ipfs-distro: 
    #     # https://hub.docker.com/r/ipfs/kubo/
    #     image: ipfs/kubo:latest
    #     hostname: ipfs-host-distro
    #     networks:
    #         bridge:
    #             aliases:
    #                 - ipfs-host-distro
    #     deploy:
    #         resources:
    #             limits:
    #                 # cpus is a percentage of total power: 1.0==100%
    #                 cpus: "0.1"
    #                 memory: 1000M
    #             # reservations:
    #             #   cpus: 0.25
    #             #   memory: 128M

    #     environment:
    #         # IPFS_PROFILE options (lowpower | server)
    #         IPFS_PROFILE: "server" 
    #         IPFS_PATH: "/data/ipfs"
        
    #     volumes:
    #         - '${ipfs_staging}:/export'
    #         - '${ipfs_data}:/data/ipfs'

    #     ports:
    #         # Allow this thru your firewall: sudo ufw allow 4001
    #         - "4001:4001"
    #         - "4001:4001/udp"

    quanta-distro:
        image: ${DOCKER_IMAGE}
        depends_on:
            - redis-distro
            - mongo-distro
            - pgdb-distro
            # - ipfs-distro
        build: 
            context: ${PRJROOT}
            args:
                PORT_SEC: "${PORT_SEC}"
                PORT: "${PORT}"
                PORT_DEBUG: "${PORT_DEBUG}"
                XMS: "${XMS}"
                XMX: "${XMX}"
                REDIS_HOST: "${REDIS_HOST}"
                REDIS_PORT: "${REDIS_PORT}"
                REDIS_PASSWORD: "${REDIS_PASSWORD}"
            dockerfile: ./dockerfile-distro
        
        # =================================================================
        # DEPLOY REPLICAS
        # Enable either one of the two deploy sections below
        # =================================================================
        # deploy for normal development with single replia
        # NOTE: If you don't need Zero Downtime deploy you can just set multiple replias here
        deploy:
            restart_policy:
                condition: on-failure
                # delay is time between restart attempts
                delay: 10s
                max_attempts: 4
                window: 120s
            replicas: 1
        # =================================================================
        # This config does a Zero-Downtime Redeploy!!
        # deploy:
        #     replicas: 2
        #     update_config:
        #         parallelism: 1
        #         order: start-first
        #         failure_action: rollback
        #         delay: 10s
        #     rollback_config:
        #         parallelism: 0
        #         order: stop-first
        #     restart_policy:
        #         condition: any
        #         delay: 5s
        #         max_attempts: 3
        #         window: 120s
        # healthcheck:
        #     test: ["CMD", "curl", "-f", "http://quanta-host:${PORT}/health"]
        #     interval: 10m
        #     timeout: 10s
        #     retries: 3
        #     start_period: 20s
        # ====================================================================

        hostname: quanta-host
        networks:
            bridge:
                aliases:
                    - quanta-host

        volumes:
            - '${DATA_FOLDER}/docs:/docs'
            - '${DATA_FOLDER}/tmp:/tmp'
            - '${DATA_FOLDER}/log:/log'
            - '${DEPLOY_TARGET}/config:/config'
            - '/etc/letsencrypt/live/${quanta_domain}-0001:/letsencrypt'

        ports:
            - '${HOST_PORT_SEC}:${PORT_SEC}'
            - '${HOST_PORT}:${PORT}'
            - '8000:8000'
        
        environment:
            # Docker swarm vars
            X_NODE_ID: "{{.Node.ID}}"
            X_NODE_HOSTNAME: '{{.Node.Hostname}}'
            X_SERVICE_ID: '{{.Service.ID}}'
            X_SERVICE_NAME: '{{.Service.Name}}'
            X_TASK_SLOT: "{{.Task.Slot}}"
            X_TASK_ID: '{{.Task.ID}}'
            X_TASK_NAME: '{{.Task.Name}}'

            QUANTA_VER: "${QUANTA_VER}"
            logging.config: /log/logback.xml
            XMS: "${XMS}"
            XMX: "${XMX}"

            REDIS_HOST: "${REDIS_HOST}"
            REDIS_PORT: "${REDIS_PORT}"
            REDIS_PASSWORD: "${REDIS_PASSWORD}"

            SPRING_DATASOURCE_URL: "jdbc:postgresql://pgdb-distro:5432/quanta-pg"
            SPRING_DATASOURCE_USERNAME: "quanta-pg"
            SPRING_DATASOURCE_PASSWORD: ${pgPassword}

            adminPassword: "${adminPassword}"
            mongoPassword: "${mongoPassword}"
            OPENAI_API_KEY: "${OPENAI_API_KEY}"
            mongoSecurity: "true"

            # WARNING: Most browsers (other than Firefox) will not support crypto unless you're on HTTPS
            requireCrypto: "true"

            # NOTE: '>-' removes all newline characters and makes one long string
            # Using '|' there instead would preserve the newlines after read in
            # The '-' after either of those removes any trailing newline
            testUserAccounts: >-
                FollowBot:${adminPassword}:${devEmail},
                adam:${testPassword}:${devEmail},
                bob:${testPassword}:${devEmail},
                cory:${testPassword}:${devEmail},
                dan:${testPassword}:${devEmail},
                eric:${testPassword}:${devEmail}
    
            throttleTime: "0"
            spring.config.location: "classpath:/application.properties" 
            mongodb.host: "${MONGO_HOST}"
            mongodb.port: "${MONGO_PORT}" 

            instanceId: "prod"
            profileName: "prod"

            server.port: "${PORT_SEC}" 
            httpProtocol: "https" 
            metaHost: "${quanta_domain}" 
            
            allowFileSystemSearch: "false"

            ipfsEnabled: "${ipfsEnabled}"
            spring.http.multipart.max-file-size: "200MB" 
            spring.http.multipart.max-request-size: "200MB" 
            spring.servlet.multipart.max-file-size: "200MB"
            spring.servlet.multipart.max-request-size: "200MB"
            adminDataFolder: "/tmp" 

            # Uncomment for debugging... (don't forget to open ufw firewall for port on server)
            JAVA_TOOL_OPTIONS: "-agentlib:jdwp=transport=dt_socket,address=0.0.0.0:8000,server=y,suspend=n"
            
            ipfs.host: "http://ipfs-host-distro"
            ipfs.apiPort: "5001"
            ipfs.gatewayPort: "8080"

            security.require-ssl: "true" 
            server.ssl.key-store: "/letsencrypt/keystore.p12" 
            server.ssl.key-store-password: "${prodKeyStorePassword}" 
            server.ssl.keyStoreType: "PKCS12" 
            server.ssl.keyAlias: "tomcat" 

            mail.port: ""
            mail.user: "postmaster@quantizr.com"
            mail.password: "${emailPassword}" 
            mail.host: "smtp.mailgun.org" 
            mail.from: "admin@quanta.wiki"

            stripe.apiKey: "${stripeApiKey}"
            stripe.endpointKey: "${stripeEndpointKey}"
            stripe.paymentLink: "${stripePaymentLink}"

networks:
    bridge:
